name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # BƯỚC CẬP NHẬT: Tự động tạo Dockerfile tối ưu, sao chép cả backend lẫn frontend vào vị trí chính xác
      - name: Create Dockerfile dynamically
        run: |
          cat << 'EOF' > ./Dockerfile
          FROM node:20-alpine
          WORKDIR /app

          # Cài đặt thư viện cho phần backend trước để tối ưu layer cache
          COPY backend/package*.json ./
          RUN npm ci --only=production

          # Copy toàn bộ mã nguồn của backend vào /app
          COPY backend/ .

          # Đồng thời copy thư mục frontend từ ngoài vào đúng vị trí /frontend mà ứng dụng gọi tới
          COPY frontend/ /frontend/

          EXPOSE 3000
          CMD ["node", "index.js"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
