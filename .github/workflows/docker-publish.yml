name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # BƯỚC TỰ TẠO DOCKERFILE: Vì repo không có sẵn, ta tự tạo ra một file Dockerfile tối ưu cho Node.js
      - name: Create Dockerfile dynamically
        run: |
          cat << 'EOF' > ./Dockerfile
          FROM node:20-alpine
          WORKDIR /app
          # Copy các file quản lý package từ thư mục backend vào
          COPY backend/package*.json ./
          RUN npm ci --only=production
          # Copy toàn bộ mã nguồn của backend vào container
          COPY backend/ .
          EXPOSE 3000
          CMD ["node", "index.js"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile # Trỏ thẳng vào file Dockerfile vừa được tạo tự động phía trên
          push: true
          platforms: linux/amd64,linux/arm64 # Build đa kiến trúc hỗ trợ cả VPS ARM64 của bạn
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
